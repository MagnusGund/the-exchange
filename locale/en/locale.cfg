[mod-name]
the-exchange=The Exchange

[mod-description]
the-exchange=A new planet mod for Factorio Space Age. Journey to The Exchange, an ancient megastructure beyond Aquilo, where you import materials, fulfill orders, earn credits, and unlock permanent factory-wide bonuses.

[mod-setting-name]
ii-import-tick-rate=Import Processing Rate (ticks)
ii-base-import-amount=Base Import Amount
ii-starting-credits=Starting Credits
ii-max-active-orders=Maximum Active Orders
ii-show-tutorial-tips=Show Tutorial Tips
ii-data-terminal-conversion-rate=Base Conversion Cost
ii-data-terminal-scaling-factor=Conversion Cost Scaling

[mod-setting-description]
ii-import-tick-rate=How often import chests process items (lower = faster, default 30 = 0.5 seconds)
ii-base-import-amount=Base number of items imported per tick
ii-starting-credits=Credits given at the start of a new game
ii-max-active-orders=Maximum number of orders that can be active simultaneously
ii-show-tutorial-tips=Display helpful tips when starting
ii-data-terminal-conversion-rate=Base credit cost to convert to 1 Exchange Data
ii-data-terminal-scaling-factor=Cost multiplier applied per conversion (exponential)

[item-name]
ii-exchange-data=Exchange Data
ii-data-matrix=Data Matrix
ii-commerce-science-pack=Commerce Science Pack
ii-credit-token=Credit Token
ii-import-chest=Import Chest
ii-export-chest=Export Chest
ii-data-terminal=Data Terminal

[item-description]
ii-exchange-data=Raw data extracted from the Exchange network. Used to create Data Matrices.
ii-data-matrix=Processed data matrix ready for science pack production.
ii-commerce-science-pack=Science pack derived from Exchange commerce data. Enables infinite research.
ii-credit-token=A token representing trade credits (not placeable).
ii-import-chest=Imports raw materials from the Exchange network. Configure via The Exchange GUI.
ii-export-chest=Accepts products to fulfill orders and earn credits.
ii-data-terminal=Converts credits to Exchange Data. Cost scales with each conversion.

[entity-name]
ii-import-chest=Import Chest
ii-export-chest=Export Chest
ii-data-terminal=Data Terminal
ii-the-exchange=The Exchange

[entity-description]
ii-import-chest=Generates materials from the Exchange network. Select material in The Exchange GUI.
ii-export-chest=Place items here to fulfill active orders and earn credits.
ii-data-terminal=Automatically converts credits to Exchange Data when powered.
ii-the-exchange=A vast trading hub floating in space. No environmental hazards, perfect for commerce.


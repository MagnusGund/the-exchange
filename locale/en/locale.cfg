[mod-name]
incremental-industrialist=Incremental Industrialist

[mod-description]
incremental-industrialist=An incremental game layer for Factorio Space Age. Import raw materials, fulfill production orders, earn credits, and unlock permanent factory upgrades.

[mod-setting-name]
ii-base-import-rate=Base Import Rate (items/sec)
ii-starting-order-slots=Starting Order Slots
ii-show-tutorial-tips=Show Tutorial Tips

[mod-setting-description]
ii-base-import-rate=How many items per second each import chest generates at base level.
ii-starting-order-slots=How many concurrent orders are available at the start.
ii-show-tutorial-tips=Display helpful tips when using the trade hub for the first time.

[entity-name]
ii-trade-hub=Trade Hub
ii-import-chest=Import Chest
ii-export-chest=Export Chest

[entity-description]
ii-trade-hub=The central hub for managing imports, exports, and upgrades. Place import and export chests nearby.
ii-import-chest=Automatically generates resources and outputs them to adjacent belts. Configure which material to import.
ii-export-chest=Accepts products from belts to fulfill active orders. Items matching orders are consumed for credits.

[item-name]
ii-trade-hub=Trade Hub
ii-import-chest=Import Chest
ii-export-chest=Export Chest

[item-description]
ii-trade-hub=Place this to establish your trading operations. Unlocks the order board and upgrade shop.
ii-import-chest=Generates selected raw materials. Place adjacent to belts for automatic output.
ii-export-chest=Collects products to fulfill orders. Place adjacent to belts for automatic input.

[recipe-name]
ii-trade-hub=Trade Hub
ii-import-chest=Import Chest
ii-export-chest=Export Chest

[technology-name]
ii-trade-operations=Trade Operations
ii-advanced-imports=Advanced Imports
ii-robot-logistics-bonus=Robot Logistics Enhancement

[technology-description]
ii-trade-operations=Unlock the Trade Hub and begin your journey as an Incremental Industrialist.
ii-advanced-imports=Unlock the ability to import processed materials instead of raw ores.
ii-robot-logistics-bonus=Improve robot cargo capacity and speed through trade upgrades.


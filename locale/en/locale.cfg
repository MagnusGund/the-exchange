[technology-description]
ii-planet-discovery=Discover The Exchange, an ancient megastructure beyond Aquilo. A massive trading hub from a forgotten civilization, perfect for commerce and production.
ii-incremental-commerce=Unlock Import and Export chests to begin trading with the Exchange network.
ii-data-terminal=Unlock the Data Terminal to convert credits into Exchange Data.
ii-commerce-science=Unlock Commerce Science Packs for infinite research.
ii-advanced-orders=Unlock Tier 2 orders with intermediate products.
ii-complex-orders=Unlock Tier 3 orders with advanced components.
ii-industrial-orders=Unlock Tier 4 orders with high-tech products.
ii-mega-orders=Unlock Tier 5 orders with end-game products.
ii-crafting-speed-bonus=Increase hand-crafting speed using Commerce Science.
ii-mining-productivity-bonus=Increase mining drill productivity using Commerce Science.
ii-lab-speed-bonus=Increase lab research speed using Commerce Science.
ii-robot-cargo-bonus=Increase robot cargo capacity using Commerce Science.
ii-robot-speed-bonus=Increase robot movement speed using Commerce Science.
ii-inserter-capacity-bonus=Increase inserter stack size using Commerce Science.

